<!DOCTYPE html>
<html><head><meta charset='utf-8'><title>3D Product Lattice</title>
<style>body{margin:0;overflow:hidden;font-family:sans-serif}
#info{position:absolute;top:10px;left:10px;color:#333;background:rgba(255,255,255,0.9);padding:10px;border-radius:6px;font-size:13px}
#tooltip{position:absolute;display:none;background:rgba(0,0,0,0.8);color:#fff;padding:4px 8px;border-radius:4px;font-size:12px;pointer-events:none}
</style></head><body>
<div id="info"><b>3D Product Lattice</b><br>
8 states, 12 transitions<br>
X: Factor 1 (2 states)<br>
Y: Factor 2 (2 states)<br>
Z: Factor 3 (2 states)</div>
<div id="tooltip"></div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from "three";
import {OrbitControls} from "three/addons/controls/OrbitControls.js";
const nodes = [{id:0,x:1,y:1,z:1,label:"end",color:"#16a34a"},{id:1,x:1,y:1,z:0,label:"((end, end), c)",color:"#9ca3af"},{id:2,x:1,y:0,z:1,label:"((end, b), end)",color:"#9ca3af"},{id:3,x:1,y:0,z:0,label:"((end, b), c)",color:"#9ca3af"},{id:4,x:0,y:1,z:1,label:"((a, end), end)",color:"#9ca3af"},{id:5,x:0,y:1,z:0,label:"((a, end), c)",color:"#9ca3af"},{id:6,x:0,y:0,z:1,label:"((a, b), end)",color:"#9ca3af"},{id:7,x:0,y:0,z:0,label:"((a, b), c)",color:"#2563eb"}];
const edges = [{src:1,tgt:0,label:"c"},{src:2,tgt:0,label:"b"},{src:3,tgt:1,label:"b"},{src:3,tgt:2,label:"c"},{src:4,tgt:0,label:"a"},{src:5,tgt:1,label:"a"},{src:5,tgt:4,label:"c"},{src:6,tgt:2,label:"a"},{src:6,tgt:4,label:"b"},{src:7,tgt:3,label:"a"},{src:7,tgt:5,label:"b"},{src:7,tgt:6,label:"c"}];

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf8f9fa);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);

// Compute center and scale
let cx=0,cy=0,cz=0;
nodes.forEach(n=>{cx+=n.x;cy+=n.y;cz+=n.z});
cx/=nodes.length; cy/=nodes.length; cz/=nodes.length;
let maxR=1;
nodes.forEach(n=>{
  const d=Math.sqrt((n.x-cx)**2+(n.y-cy)**2+(n.z-cz)**2);
  if(d>maxR) maxR=d;
});
const spacing = 2.5;

// Add nodes as spheres
const nodeMeshes = [];
const nodeMap = {};
nodes.forEach(n=>{
  const geo = new THREE.SphereGeometry(0.18, 16, 16);
  const mat = new THREE.MeshPhongMaterial({color: n.color});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set((n.x-cx)*spacing, -(n.y-cy)*spacing, (n.z-cz)*spacing);
  mesh.userData = {label: n.label, id: n.id};
  scene.add(mesh);
  nodeMeshes.push(mesh);
  nodeMap[n.id] = mesh;
});

// Add edges as lines
edges.forEach(e=>{
  const s = nodeMap[e.src], t = nodeMap[e.tgt];
  if(!s||!t) return;
  const geo = new THREE.BufferGeometry().setFromPoints([s.position, t.position]);
  const mat = new THREE.LineBasicMaterial({color: 0x999999, transparent:true, opacity:0.5});
  scene.add(new THREE.Line(geo, mat));
});

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dl = new THREE.DirectionalLight(0xffffff, 0.8);
dl.position.set(5, 10, 7);
scene.add(dl);

camera.position.set(maxR*spacing*1.5, maxR*spacing*1.5, maxR*spacing*1.5);
controls.target.set(0, 0, 0);
controls.update();

// Tooltip
const tooltip = document.getElementById('tooltip');
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
renderer.domElement.addEventListener('mousemove', e=>{
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(nodeMeshes);
  if(hits.length>0){
    tooltip.style.display='block';
    tooltip.style.left=e.clientX+12+'px';
    tooltip.style.top=e.clientY+12+'px';
    tooltip.textContent=hits[0].object.userData.label;
  } else {
    tooltip.style.display='none';
  }
});

window.addEventListener('resize', ()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera)}
animate();

</script></body></html>
